{% extends "base.html" %}
{% block content %}<div class="d-flex justify-content-between align-items-center mb-3"><h1>Blog Management</h1>{% if current_user %}<a class="btn btn-dark" href="{{ url_for('blog_form') }}">Create Blog</a>{% endif %}</div><div class="row g-3">{% for b in blogs %}<div class="col-md-6"><div class="card h-100"><div class="card-body"><div class="d-flex justify-content-between"><h5><a href="{{ url_for('blog_detail', slug=b.slug) }}">{{ b.title }}</a></h5><span class="badge text-bg-light">{{ b.status }}</span></div><p>{{ b.summary }}</p><span class="text-secondary">{{ b.views }} views</span>{% if current_user %}<div class="mt-3 d-flex gap-2"><a class="btn btn-sm btn-dark" href="{{ url_for('blog_edit', blog_id=b.id) }}">Edit</a><form method="post" action="{{ url_for('blog_delete', blog_id=b.id) }}"><input type="hidden" name="csrf_token" value="{{ csrf_token }}"><button class="btn btn-sm btn-outline-danger">Delete</button></form></div>{% endif %}</div></div></div>{% endfor %}</div>{% endblock %}
