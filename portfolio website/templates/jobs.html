{% extends "base.html" %}
{% block content %}<div class="row g-3"><div class="col-lg-4"><div class="section-panel"><h1>Add Applied Job</h1><form method="post"><input type="hidden" name="csrf_token" value="{{ csrf_token }}"><input class="form-control mb-2" name="company" placeholder="Company" required><input class="form-control mb-2" name="role" placeholder="Role" required><input class="form-control mb-2" name="source" placeholder="Source"><select class="form-select mb-2" name="status"><option>Applied</option><option>Screening</option><option>Interview</option><option>Offer</option><option>Rejected</option></select><input class="form-control mb-2" name="applied_on" placeholder="Applied on"><input class="form-control mb-2" name="interview_at" placeholder="Interview schedule"><textarea class="form-control mb-2" name="notes" placeholder="Notes"></textarea><button class="btn btn-dark">Track job</button></form></div></div><div class="col-lg-8"><div class="section-panel"><h1>Job Application Tracker</h1><table class="table"><tr><th>Company</th><th>Role</th><th>Status</th><th>Interview</th><th></th></tr>{% for j in jobs %}<tr><td>{{ j.company }}</td><td>{{ j.role }}</td><td>{{ j.status }}</td><td>{{ j.interview_at }}</td><td><form method="post" action="{{ url_for('job_delete', job_id=j.id) }}"><input type="hidden" name="csrf_token" value="{{ csrf_token }}"><button class="btn btn-sm btn-outline-danger">Delete</button></form></td></tr>{% endfor %}</table></div></div></div>{% endblock %}
