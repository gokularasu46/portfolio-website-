{% extends "base.html" %}
{% block content %}<div class="section-panel"><h1>{{ "Edit" if project.id else "Add" }} Project</h1><form method="post" enctype="multipart/form-data"><input type="hidden" name="csrf_token" value="{{ csrf_token }}"><input class="form-control mb-3" name="title" value="{{ project.title or '' }}" placeholder="Project title" required><textarea class="form-control mb-3" name="description" rows="4" placeholder="Description" required>{{ project.description or '' }}</textarea><input class="form-control mb-3" name="tech_stack" value="{{ project.tech_stack or '' }}" placeholder="Tech stack"><input class="form-control mb-3" name="github_url" value="{{ project.github_url or '' }}" placeholder="GitHub URL"><input class="form-control mb-3" name="live_url" value="{{ project.live_url or '' }}" placeholder="Live URL"><select class="form-select mb-3" name="status"><option>Published</option><option>Draft</option><option>Archived</option></select><input class="form-control mb-3" type="file" name="image" accept=".png,.jpg,.jpeg,.webp"><button class="btn btn-dark">Save project</button></form></div>{% endblock %}
