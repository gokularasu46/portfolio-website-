{% extends "base.html" %}
{% block content %}<h1>Contact Management</h1>{% for m in messages %}<div class="section-panel mb-3"><div class="d-flex justify-content-between"><h5>{{ m.subject }}</h5><span class="badge text-bg-light">{{ m.status }}</span></div><p><strong>{{ m.name }}</strong> &lt;{{ m.email }}&gt;</p><p>{{ m.message }}</p><form method="post" action="{{ url_for('message_reply', message_id=m.id) }}"><input type="hidden" name="csrf_token" value="{{ csrf_token }}"><textarea class="form-control mb-2" name="reply" rows="3" placeholder="Reply">{{ m.reply }}</textarea><button class="btn btn-sm btn-dark">Save reply</button></form></div>{% endfor %}{% endblock %}
