{% extends "base.html" %}
{% block content %}<article class="section-panel"><h1>{{ blog.title }}</h1><p class="text-secondary">{{ blog.summary }} Â· {{ blog.views }} views</p><p>{{ blog.content }}</p></article><div class="section-panel mt-3"><h2>Comments</h2>{% for c in blog.comments %}<p><strong>{{ c.name }}</strong><br>{{ c.comment }}</p>{% endfor %}<form method="post"><input type="hidden" name="csrf_token" value="{{ csrf_token }}"><input class="form-control mb-2" name="name" placeholder="Name" required><textarea class="form-control mb-2" name="comment" rows="3" placeholder="Comment" required></textarea><button class="btn btn-dark">Comment</button></form></div>{% endblock %}
