{% extends "base.html" %}
{% block content %}<div class="row g-3"><div class="col-lg-4"><div class="section-panel"><h1>Add Certificate</h1><form method="post" enctype="multipart/form-data"><input type="hidden" name="csrf_token" value="{{ csrf_token }}"><input class="form-control mb-3" name="title" placeholder="Title" required><input class="form-control mb-3" name="issuer" placeholder="Issuer" required><input class="form-control mb-3" name="issue_date" placeholder="Issue date"><input class="form-control mb-3" name="credential_url" placeholder="Credential URL"><input class="form-control mb-3" type="file" name="certificate"><button class="btn btn-dark">Add</button></form></div></div><div class="col-lg-8"><div class="section-panel"><h1>Certification Management</h1><table class="table"><tr><th>Title</th><th>Issuer</th><th>File</th><th></th></tr>{% for c in certifications %}<tr><td>{{ c.title }}</td><td>{{ c.issuer }}</td><td>{% if c.certificate_file %}<a href="{{ url_for('uploaded_file', filename=c.certificate_file) }}">Download</a>{% endif %}</td><td><form method="post" action="{{ url_for('certification_delete', cert_id=c.id) }}"><input type="hidden" name="csrf_token" value="{{ csrf_token }}"><button class="btn btn-sm btn-outline-danger">Delete</button></form></td></tr>{% endfor %}</table></div></div></div>{% endblock %}
