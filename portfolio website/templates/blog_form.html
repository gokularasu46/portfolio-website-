{% extends "base.html" %}
{% block content %}<div class="section-panel"><h1>{{ "Edit" if blog.id else "Create" }} Blog</h1><form method="post"><input type="hidden" name="csrf_token" value="{{ csrf_token }}"><input class="form-control mb-3" name="title" value="{{ blog.title or '' }}" placeholder="Title" required><input class="form-control mb-3" name="slug" value="{{ blog.slug or '' }}" placeholder="Slug"><input class="form-control mb-3" name="summary" value="{{ blog.summary or '' }}" placeholder="Summary"><textarea class="form-control mb-3" name="content" rows="10" required>{{ blog.content or '' }}</textarea><select class="form-select mb-3" name="status"><option>Draft</option><option>Published</option></select><button class="btn btn-dark">Save blog</button></form></div>{% endblock %}
