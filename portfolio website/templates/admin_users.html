{% extends "base.html" %}
{% block content %}<div class="section-panel"><h1>User Management</h1><table class="table"><tr><th>Name</th><th>Email</th><th>Role</th><th>Created</th></tr>{% for u in users %}<tr><td>{{ u.name }}</td><td>{{ u.email }}</td><td>{{ u.role }}</td><td>{{ u.created_at.strftime("%Y-%m-%d") }}</td></tr>{% endfor %}</table></div>{% endblock %}
